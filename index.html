<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#0F6E56"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>مكتبة الدروس</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css"/>
<style>
:root {
  --green:    #0F6E56;
  --green-lt: #E1F5EE;
  --green-dk: #085041;
  --gold:     #BA7517;
  --gold-lt:  #FAEEDA;
  --bg:       #0a1a14;
  --bg2:      #112318;
  --bg3:      #1a3326;
  --surface:  #1e3d2e;
  --border:   rgba(255,255,255,0.08);
  --border2:  rgba(255,255,255,0.14);
  --t1:       #f0f7f4;
  --t2:       #8bbfaa;
  --t3:       #4d8a72;
  --radius:   14px;
  --radius-sm:8px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--t1); font-family: -apple-system, 'Segoe UI', sans-serif; overflow: hidden; }

#app { display: flex; flex-direction: column; height: 100%; }
#topbar { flex-shrink: 0; background: var(--bg2); padding: calc(var(--safe-top) + 12px) 16px 12px; border-bottom: 0.5px solid var(--border); }
#content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--safe-bot) + 80px); }
#player-bar { flex-shrink: 0; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 0.5px solid var(--border2); padding: 10px 16px calc(var(--safe-bot) + 12px); display: none; z-index: 10; }

.topbar-row { display: flex; align-items: center; justify-content: space-between; }
.app-title { font-size: 22px; font-weight: 700; color: var(--t1); letter-spacing: -0.5px; }
.app-sub { font-size: 12px; color: var(--t3); margin-top: 1px; }

.search-wrap { margin: 14px 16px 0; position: relative; }
.search-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--t3); font-size: 16px; pointer-events: none; }
#search { width: 100%; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px 10px 36px; color: var(--t1); font-size: 14px; outline: none; }
#search::placeholder { color: var(--t3); }

.section-hd { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; }
.section-hd span { font-size: 11px; font-weight: 600; color: var(--t3); letter-spacing: 0.08em; text-transform: uppercase; }
.section-hd small { font-size: 12px; color: var(--t3); }

.courses-list { padding: 0 12px; display: flex; flex-direction: column; gap: 10px; }
.course-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; display: flex; align-items: center; gap: 14px; cursor: pointer; }
.course-card.playing { border-color: var(--green); background: var(--bg3); }
.course-icon-wrap { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; background: #1a3d2a; }
.course-body { flex: 1; min-width: 0; }
.course-name { font-size: 15px; font-weight: 500; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.play-indicator { width: 32px; height: 32px; border-radius: 50%; background: var(--green); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.play-indicator i { font-size: 15px; color: #fff; }
.play-indicator.paused { background: var(--surface); }

.empty { text-align: center; padding: 3rem 2rem; color: var(--t3); }
.empty i { font-size: 40px; margin-bottom: 12px; display: block; }

.player-inner { display: flex; align-items: center; gap: 10px; }
.player-thumb { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; background: #1a3d2a; }
.player-info { flex: 1; min-width: 0; }
.player-name { font-size: 13px; font-weight: 500; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-controls { display: flex; align-items: center; gap: 4px; }
.pc-btn { background: none; border: none; color: var(--t2); cursor: pointer; padding: 6px; display: flex; align-items: center; justify-content: center; font-size: 20px; border-radius: 50%; }
.pc-play { background: var(--green); color: #fff; width: 38px; height: 38px; border-radius: 50%; font-size: 18px; }

.prog-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.prog-track { flex: 1; height: 3px; background: var(--surface); border-radius: 999px; cursor: pointer; position: relative; }
.prog-fill { height: 100%; background: var(--green); border-radius: 999px; pointer-events: none; }
.prog-time { font-size: 10px; color: var(--t3); flex-shrink: 0; min-width: 32px; }
.prog-time.right { text-align: right; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="topbar-row">
      <div>
        <div class="app-title">مكتبة الدروس</div>
        <div class="app-sub">Playlist Google Drive</div>
      </div>
    </div>
    <div class="search-wrap">
      <i class="ti ti-search"></i>
      <input id="search" type="search" placeholder="Rechercher un cours…" oninput="renderList()"/>
    </div>
  </div>

  <div id="content">
    <div class="section-hd"><span>Vos Audios</span><small id="count-label"></small></div>
    <div class="courses-list" id="courses-list"></div>
  </div>

  <div id="player-bar">
    <div class="player-inner">
      <div class="player-thumb" id="pb-thumb">📖</div>
      <div class="player-info">
        <div class="player-name" id="pb-name">—</div>
      </div>
      <div class="player-controls">
        <button class="pc-btn" onclick="skip(-15)"><i class="ti ti-rotate-clockwise-2" style="transform:scaleX(-1)"></i></button>
        <button class="pc-btn pc-play" onclick="togglePlay()"><i class="ti ti-player-play" id="pb-play-icon"></i></button>
        <button class="pc-btn" onclick="skip(15)"><i class="ti ti-rotate-clockwise-2"></i></button>
      </div>
    </div>
    <div class="prog-row">
      <span class="prog-time" id="pb-cur">0:00</span>
      <div class="prog-track" onclick="seekBar(event)">
        <div class="prog-fill" id="prog-fill" style="width:0%"></div>
      </div>
      <span class="prog-time right" id="pb-dur">0:00</span>
    </div>
  </div>
</div>

<audio id="audio-el"></audio>

async function fetchDriveAudios() {
  const url = `https://www.googleapis.com/drive/v3/files?q='${FOLDER_ID}'+in+parents+and+mimeType+contains+'audio/'+and+explicitlyTrashed=false&fields=files(id,name)&key=${API_KEY}`;
  try {
    const response = await fetch(url);
    const data = await response.json();
    if (data.files) {
      tracks = data.files.map(file => ({
        name: file.name.replace(/\.[^/.]+$/, ""), // Enlève l'extension (.mp3)
        url: `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media&key=${API_KEY}`
      })).sort((a, b) => a.name.localeCompare(b.name));
      renderList();
    }
  } catch (e) {
    console.error("Erreur Drive:", e);
    document.getElementById('courses-list').innerHTML = '<div class="empty"><p>Erreur de connexion au dossier Google Drive.</p></div>';
  }
}
