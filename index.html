<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#0F6E56"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>مكتبة الدروس</title>
<link rel="manifest" href="manifest.json"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css"/>
<style>
:root {
  --green:    #0F6E56;
  --green-lt: #E1F5EE;
  --green-dk: #085041;
  --gold:     #BA7517;
  --gold-lt:  #FAEEDA;
  --bg:       #0a1a14;
  --bg2:      #112318;
  --bg3:      #1a3326;
  --surface:  #1e3d2e;
  --border:   rgba(255,255,255,0.08);
  --border2:  rgba(255,255,255,0.14);
  --t1:       #f0f7f4;
  --t2:       #8bbfaa;
  --t3:       #4d8a72;
  --radius:   14px;
  --radius-sm:8px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--t1); font-family: -apple-system, 'Segoe UI', sans-serif; overflow: hidden; }

/* Layout */
#app { display: flex; flex-direction: column; height: 100%; }
#topbar { flex-shrink: 0; background: var(--bg2); padding: calc(var(--safe-top) + 12px) 16px 12px; border-bottom: 0.5px solid var(--border); }
#content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--safe-bot) + 80px); }
#player-bar { flex-shrink: 0; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 0.5px solid var(--border2); padding: 10px 16px calc(var(--safe-bot) + 12px); display: none; z-index: 10; }

/* Topbar */
.topbar-row { display: flex; align-items: center; justify-content: space-between; }
.app-title { font-size: 22px; font-weight: 700; color: var(--t1); letter-spacing: -0.5px; }
.app-sub { font-size: 12px; color: var(--t3); margin-top: 1px; }
#add-btn { display: flex; align-items: center; gap: 6px; background: var(--green); color: #fff; border: none; border-radius: var(--radius-sm); padding: 8px 14px; font-size: 13px; font-weight: 500; cursor: pointer; }
#add-btn i { font-size: 16px; }

/* Search */
.search-wrap { margin: 14px 16px 0; position: relative; }
.search-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--t3); font-size: 16px; pointer-events: none; }
#search { width: 100%; background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px 10px 36px; color: var(--t1); font-size: 14px; outline: none; }
#search::placeholder { color: var(--t3); }

/* Filters */
.filters { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; scrollbar-width: none; }
.filters::-webkit-scrollbar { display: none; }
.filter-pill { flex-shrink: 0; padding: 6px 14px; border-radius: 999px; font-size: 13px; border: 0.5px solid var(--border2); background: transparent; color: var(--t2); cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.filter-pill.active { background: var(--green); color: #fff; border-color: var(--green); }

/* Section header */
.section-hd { display: flex; align-items: center; justify-content: space-between; padding: 4px 16px 10px; }
.section-hd span { font-size: 11px; font-weight: 600; color: var(--t3); letter-spacing: 0.08em; text-transform: uppercase; }
.section-hd small { font-size: 12px; color: var(--t3); }

/* Course cards */
.courses-list { padding: 0 12px; display: flex; flex-direction: column; gap: 10px; }
.course-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: background 0.12s, border-color 0.12s; }
.course-card:active { background: var(--bg3); }
.course-card.playing { border-color: var(--green); background: var(--bg3); }
.course-icon-wrap { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
.course-body { flex: 1; min-width: 0; }
.course-subject-tag { font-size: 10px; font-weight: 600; color: var(--green); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 3px; }
.course-name { font-size: 15px; font-weight: 500; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
.course-meta { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--t3); }
.course-meta i { font-size: 13px; }
.play-indicator { width: 32px; height: 32px; border-radius: 50%; background: var(--green); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.play-indicator i { font-size: 15px; color: #fff; }
.play-indicator.paused { background: var(--surface); }

/* Empty state */
.empty { text-align: center; padding: 3rem 2rem; color: var(--t3); }
.empty i { font-size: 40px; margin-bottom: 12px; display: block; }
.empty p { font-size: 14px; line-height: 1.6; }

/* Player bar */
.player-inner { display: flex; align-items: center; gap: 10px; }
.player-thumb { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.player-info { flex: 1; min-width: 0; }
.player-name { font-size: 13px; font-weight: 500; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-chapter { font-size: 11px; color: var(--t3); margin-top: 1px; }
.player-controls { display: flex; align-items: center; gap: 4px; }
.pc-btn { background: none; border: none; color: var(--t2); cursor: pointer; padding: 6px; display: flex; align-items: center; justify-content: center; font-size: 20px; border-radius: 50%; }
.pc-btn:active { background: var(--surface); }
.pc-play { background: var(--green); color: #fff; width: 38px; height: 38px; border-radius: 50%; font-size: 18px; }
.pc-play:active { opacity: 0.85; }

/* Progress */
.prog-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.prog-track { flex: 1; height: 3px; background: var(--surface); border-radius: 999px; cursor: pointer; position: relative; }
.prog-fill { height: 100%; background: var(--green); border-radius: 999px; pointer-events: none; }
.prog-time { font-size: 10px; color: var(--t3); flex-shrink: 0; min-width: 32px; }
.prog-time.right { text-align: right; }

/* Speed badge */
.speed-badge { font-size: 11px; font-weight: 600; padding: 3px 7px; border-radius: 999px; border: 0.5px solid var(--border2); color: var(--t3); cursor: pointer; background: transparent; white-space: nowrap; }

/* Detail panel */
#detail-panel { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 20; flex-direction: column; overflow: hidden; }
#detail-panel.open { display: flex; }
.detail-header { background: var(--bg2); padding: calc(var(--safe-top) + 12px) 16px 14px; border-bottom: 0.5px solid var(--border); display: flex; align-items: flex-start; gap: 12px; }
.back-btn { background: none; border: none; color: var(--t2); font-size: 22px; cursor: pointer; padding: 2px; flex-shrink: 0; margin-top: 1px; }
.detail-icon { width: 46px; height: 46px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.detail-info { flex: 1; min-width: 0; }
.detail-subject { font-size: 11px; font-weight: 600; color: var(--green); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 3px; }
.detail-title { font-size: 16px; font-weight: 600; color: var(--t1); line-height: 1.3; }
.detail-duration { font-size: 12px; color: var(--t3); margin-top: 3px; }
.detail-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; padding-bottom: calc(var(--safe-bot) + 80px); }
.detail-section { margin-bottom: 20px; }
.detail-section-title { font-size: 11px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.chapter-row { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 0.5px solid var(--border); cursor: pointer; }
.chapter-row:last-child { border-bottom: none; }
.chapter-num { font-size: 12px; color: var(--t3); min-width: 20px; font-weight: 500; }
.chapter-name { flex: 1; font-size: 14px; color: var(--t2); }
.chapter-row.active .chapter-name { color: var(--green); font-weight: 500; }
.chapter-row i { font-size: 15px; color: var(--t3); }
.chapter-row.active i { color: var(--green); }
.fiche-point { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
.fiche-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; margin-top: 6px; }
.fiche-text { font-size: 14px; color: var(--t2); line-height: 1.6; }

/* Upload panel */
#upload-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 30; align-items: flex-end; }
#upload-panel.open { display: flex; }
.upload-sheet { background: var(--bg2); border-radius: 20px 20px 0 0; padding: 20px 20px calc(var(--safe-bot) + 24px); width: 100%; }
.sheet-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 99px; margin: 0 auto 20px; }
.sheet-title { font-size: 16px; font-weight: 600; color: var(--t1); margin-bottom: 6px; }
.sheet-sub { font-size: 13px; color: var(--t3); margin-bottom: 20px; line-height: 1.5; }
.upload-zone { border: 1.5px dashed var(--border2); border-radius: var(--radius); padding: 24px 16px; text-align: center; cursor: pointer; margin-bottom: 14px; background: var(--surface); }
.upload-zone i { font-size: 32px; color: var(--green); margin-bottom: 8px; display: block; }
.upload-zone p { font-size: 14px; color: var(--t2); margin-bottom: 4px; }
.upload-zone small { font-size: 12px; color: var(--t3); }
.subject-select { width: 100%; background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--t1); font-size: 14px; margin-bottom: 10px; outline: none; }
.name-input { width: 100%; background: var(--surface); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--t1); font-size: 14px; margin-bottom: 14px; outline: none; }
.name-input::placeholder { color: var(--t3); }
.confirm-btn { width: 100%; background: var(--green); color: #fff; border: none; border-radius: var(--radius-sm); padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; }
.confirm-btn:disabled { opacity: 0.4; }
.cancel-link { display: block; text-align: center; margin-top: 12px; font-size: 13px; color: var(--t3); cursor: pointer; }

/* Toast */
#toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface); color: var(--t1); font-size: 13px; padding: 10px 18px; border-radius: 999px; opacity: 0; transition: all 0.25s; z-index: 99; pointer-events: none; white-space: nowrap; border: 0.5px solid var(--border2); }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">
  <!-- Topbar -->
  <div id="topbar">
    <div class="topbar-row">
      <div>
        <div class="app-title">مكتبة الدروس</div>
        <div class="app-sub">Mes cours islamiques</div>
      </div>
      <button id="add-btn" onclick="openUpload()"><i class="ti ti-plus"></i> Ajouter</button>
    </div>
    <div class="search-wrap">
      <i class="ti ti-search"></i>
      <input id="search" type="search" placeholder="Rechercher un cours…" oninput="renderList()"/>
    </div>
  </div>

  <!-- Main content -->
  <div id="content">
    <div class="filters" id="filters"></div>
    <div class="section-hd"><span>Bibliothèque</span><small id="count-label"></small></div>
    <div class="courses-list" id="courses-list"></div>
  </div>

  <!-- Player bar -->
  <div id="player-bar">
    <div class="player-inner">
      <div class="player-thumb" id="pb-thumb"></div>
      <div class="player-info">
        <div class="player-name" id="pb-name">—</div>
        <div class="player-chapter" id="pb-chapter">—</div>
      </div>
      <div class="player-controls">
        <button class="pc-btn speed-badge" id="pb-speed" onclick="cycleSpeed()">×1</button>
        <button class="pc-btn" onclick="skip(-15)"><i class="ti ti-rotate-clockwise-2" style="transform:scaleX(-1)"></i></button>
        <button class="pc-btn pc-play" id="pb-play" onclick="togglePlay()"><i class="ti ti-player-play" id="pb-play-icon"></i></button>
        <button class="pc-btn" onclick="skip(15)"><i class="ti ti-rotate-clockwise-2"></i></button>
        <button class="pc-btn" onclick="openDetail()"><i class="ti ti-list"></i></button>
      </div>
    </div>
    <div class="prog-row">
      <span class="prog-time" id="pb-cur">0:00</span>
      <div class="prog-track" id="prog-track" onclick="seekBar(event)">
        <div class="prog-fill" id="prog-fill" style="width:0%"></div>
      </div>
      <span class="prog-time right" id="pb-dur">0:00</span>
    </div>
  </div>
</div>

<!-- Detail panel -->
<div id="detail-panel">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()"><i class="ti ti-arrow-left"></i></button>
    <div class="detail-icon" id="dt-icon"></div>
    <div class="detail-info">
      <div class="detail-subject" id="dt-subject"></div>
      <div class="detail-title" id="dt-title"></div>
      <div class="detail-duration" id="dt-duration"></div>
    </div>
  </div>
  <div class="detail-body">
    <div class="detail-section">
      <div class="detail-section-title">Chapitres / Fichiers</div>
      <div id="dt-chapters"></div>
    </div>
    <div class="detail-section" id="fiche-section">
      <div class="detail-section-title">Fiche résumée</div>
      <div id="dt-fiche"></div>
    </div>
  </div>
</div>

<!-- Upload panel -->
<div id="upload-panel" onclick="closeUploadOutside(event)">
  <div class="upload-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Ajouter un cours</div>
    <div class="sheet-sub">Choisissez vos fichiers audio (MP3, M4A, WAV…) depuis votre téléphone.</div>
    <div class="upload-zone" onclick="document.getElementById('file-input').click()">
      <i class="ti ti-music"></i>
      <p>Appuyez pour choisir un fichier audio</p>
      <small id="file-label">MP3, M4A, WAV, OGG acceptés</small>
    </div>
    <input type="file" id="file-input" accept="audio/*" multiple style="display:none" onchange="onFilePicked(event)"/>
    <select class="subject-select" id="subject-select">
      <option value="">— Choisir la matière —</option>
      <option value="Tafsir">📖 Tafsir</option>
      <option value="Fiqh">⚖️ Fiqh</option>
      <option value="Biographie du Prophète">🌙 Biographie du Prophète ﷺ</option>
      <option value="Comportement">🌸 Comportement</option>
      <option value="Hadith">📝 Hadith</option>
      <option value="Croyance">✨ Croyance</option>
    </select>
    <input class="name-input" id="course-name" type="text" placeholder="Nom du cours (optionnel)"/>
    <button class="confirm-btn" id="confirm-btn" onclick="addCourse()" disabled>Ajouter à la bibliothèque</button>
    <span class="cancel-link" onclick="closeUpload()">Annuler</span>
  </div>
</div>

<div id="toast"></div>

<audio id="audio-el"></audio>

<script>
// ── Data ──────────────────────────────────────────────────────────────
const SUBJECTS = ['Tafsir','Fiqh','Biographie du Prophète','Comportement','Hadith','Croyance'];
const ICONS = { Tafsir:'📖', Fiqh:'⚖️', 'Biographie du Prophète':'🌙', Comportement:'🌸', Hadith:'📝', Croyance:'✨' };
const COLORS = { Tafsir:'#1a3d2a', Fiqh:'#1e1e3d', 'Biographie du Prophète':'#2d1e33', Comportement:'#3d1e1e', Hadith:'#3d2e0a', Croyance:'#102433' };
const FICHE = {
  Tafsir: ['Le Tafsir est l\'explication du sens du Coran','Il faut connaître la langue arabe et les causes de révélation','Ibn Kathir et As-Sa\'di sont parmi les grands mufassirun','Chaque sourate a un objectif principal (maqsad)'],
  Fiqh: ['Le Fiqh est la compréhension des règles islamiques','Il se base sur le Coran, la Sunnah, l\'Ijma et le Qiyas','Les 4 madhabs : Hanafi, Maliki, Shafi\'i, Hanbali','La facilitation (taysir) est un principe du Fiqh'],
  'Biographie du Prophète': ['La Sira est l\'histoire complète du Prophète ﷺ','Née à La Mecque en l\'an de l\'Éléphant (570 ap. J.-C.)','La Sira est une source de lois et de modèle de vie','Ibn Hisham et Ibn Kathir ont écrit les Sira classiques'],
  Comportement: ['L\'Islam accorde une grande importance aux bonnes mœurs','"Je n\'ai été envoyé que pour parfaire les bonnes mœurs" (hadith)','Le bon comportement reflète la foi intérieure','Les vertus : honnêteté, patience, générosité, humilité'],
  Hadith: ['Le Hadith = paroles, actes et approbations du Prophète ﷺ','Sahih Bukhari et Sahih Muslim : recueils les plus authentiques','Chaque hadith a un isnad (chaîne de transmission)','Les savants ont développé la science de critique des hadiths'],
  Croyance: ['L\'Aqida est le fondement de la religion islamique','Les 6 piliers de la foi : Allah, anges, livres, prophètes, Jour Dernier, Qadar','Le Tawhid est l\'unicité absolue d\'Allah','Ibn Taymiyya et Ibn Al-Qayyim : grands savants de l\'Aqida']
};

let library = JSON.parse(localStorage.getItem('drous_library') || '[]');
let currentFilter = 'Tous';
let currentCourse = null;
let currentTrack = 0;
let isPlaying = false;
let progress = 0;
let rafId = null;
let speeds = [1, 1.25, 1.5, 2];
let speedIdx = 0;
const audio = document.getElementById('audio-el');

function saveLibrary() { localStorage.setItem('drous_library', JSON.stringify(library)); }

// ── Filters ──────────────────────────────────────────────────────────
function buildFilters() {
  const el = document.getElementById('filters');
  const all = ['Tous', ...SUBJECTS];
  el.innerHTML = all.map(s => `<button class="filter-pill${s===currentFilter?' active':''}" onclick="setFilter('${s}')">${s==='Tous'?s:ICONS[s]+' '+s}</button>`).join('');
}
function setFilter(v) { currentFilter=v; buildFilters(); renderList(); }

// ── Render list ───────────────────────────────────────────────────────
function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = library.filter(c => {
    const mf = currentFilter==='Tous' || c.subject===currentFilter;
    const ms = c.name.toLowerCase().includes(q) || c.subject.toLowerCase().includes(q);
    return mf && ms;
  });
  document.getElementById('count-label').textContent = filtered.length + ' cours';
  const el = document.getElementById('courses-list');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty"><i class="ti ti-book-off"></i><p>${library.length?'Aucun cours trouvé pour ce filtre.':'Appuyez sur <strong>+ Ajouter</strong> pour importer votre premier cours audio.'}</p></div>`;
    return;
  }
  el.innerHTML = filtered.map(c => {
    const isCur = currentCourse && currentCourse.id === c.id;
    return `<div class="course-card${isCur?' playing':''}" onclick="selectCourse('${c.id}')">
      <div class="course-icon-wrap" style="background:${COLORS[c.subject]||'#1a2a22'}">${ICONS[c.subject]||'📄'}</div>
      <div class="course-body">
        <div class="course-subject-tag">${c.subject}</div>
        <div class="course-name">${c.name}</div>
        <div class="course-meta"><i class="ti ti-music"></i>${c.tracks.length} fichier${c.tracks.length>1?'s':''}</div>
      </div>
      <div class="play-indicator${isCur&&isPlaying?'':' paused'}"><i class="ti ti-${isCur&&isPlaying?'player-pause':'player-play'}"></i></div>
    </div>`;
  }).join('');
}

// ── Select & play ─────────────────────────────────────────────────────
function selectCourse(id) {
  const c = library.find(x => x.id===id);
  if (!c) return;
  if (currentCourse && currentCourse.id===id) { openDetail(); return; }
  currentCourse = c;
  currentTrack = 0;
  loadTrack();
  renderList();
}

function loadTrack() {
  if (!currentCourse || !currentCourse.tracks.length) return;
  const t = currentCourse.tracks[currentTrack];
  audio.src = t.url;
  audio.load();
  document.getElementById('pb-thumb').textContent = ICONS[currentCourse.subject]||'📄';
  document.getElementById('pb-thumb').style.background = COLORS[currentCourse.subject]||'#1a2a22';
  document.getElementById('pb-name').textContent = currentCourse.name;
  document.getElementById('pb-chapter').textContent = t.name;
  document.getElementById('player-bar').style.display = 'block';
  updateDetailHeader();
  updateChapterList();
  playAudio();
}

function playAudio() {
  audio.play().then(() => { isPlaying=true; updatePlayBtns(); renderList(); }).catch(()=>{});
}

function togglePlay() {
  if (!currentCourse) return;
  if (isPlaying) { audio.pause(); isPlaying=false; } else { audio.play(); isPlaying=true; }
  updatePlayBtns();
  renderList();
}

function updatePlayBtns() {
  const icon = isPlaying ? 'ti-player-pause' : 'ti-player-play';
  document.getElementById('pb-play-icon').className = 'ti ' + icon;
}

function skip(s) { if (audio.src) audio.currentTime = Math.max(0, Math.min(audio.duration||0, audio.currentTime+s)); }

function seekBar(e) {
  if (!audio.duration) return;
  const r = e.offsetX / e.currentTarget.offsetWidth;
  audio.currentTime = r * audio.duration;
}

function cycleSpeed() {
  speedIdx = (speedIdx+1)%speeds.length;
  audio.playbackRate = speeds[speedIdx];
  document.getElementById('pb-speed').textContent = '×'+speeds[speedIdx];
}

function fmt(s) { s=Math.round(s||0); return Math.floor(s/60)+':'+(s%60).toString().padStart(2,'0'); }

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime/audio.duration)*100;
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('pb-cur').textContent = fmt(audio.currentTime);
  document.getElementById('pb-dur').textContent = fmt(audio.duration);
});

audio.addEventListener('ended', () => {
  if (currentTrack < currentCourse.tracks.length-1) { currentTrack++; loadTrack(); }
  else { isPlaying=false; updatePlayBtns(); renderList(); }
});

// ── Detail panel ──────────────────────────────────────────────────────
function openDetail() {
  if (!currentCourse) return;
  document.getElementById('detail-panel').classList.add('open');
  updateDetailHeader();
  updateChapterList();
  updateFiche();
}
function closeDetail() { document.getElementById('detail-panel').classList.remove('open'); }

function updateDetailHeader() {
  if (!currentCourse) return;
  document.getElementById('dt-icon').textContent = ICONS[currentCourse.subject]||'📄';
  document.getElementById('dt-icon').style.background = COLORS[currentCourse.subject]||'#1a2a22';
  document.getElementById('dt-subject').textContent = currentCourse.subject;
  document.getElementById('dt-title').textContent = currentCourse.name;
  document.getElementById('dt-duration').textContent = currentCourse.tracks.length+' fichier'+(currentCourse.tracks.length>1?'s':'');
}

function updateChapterList() {
  if (!currentCourse) return;
  document.getElementById('dt-chapters').innerHTML = currentCourse.tracks.map((t,i) => `
    <div class="chapter-row${i===currentTrack?' active':''}" onclick="goTrack(${i})">
      <span class="chapter-num">${i+1}</span>
      <span class="chapter-name">${t.name}</span>
      <i class="ti ti-${i===currentTrack&&isPlaying?'player-pause':'player-play'}"></i>
    </div>
  `).join('');
}

function updateFiche() {
  const points = FICHE[currentCourse.subject] || [];
  document.getElementById('dt-fiche').innerHTML = points.map(p => `<div class="fiche-point"><div class="fiche-dot"></div><div class="fiche-text">${p}</div></div>`).join('');
}

function goTrack(i) { currentTrack=i; loadTrack(); updateChapterList(); }

// ── Upload panel ──────────────────────────────────────────────────────
let pendingFiles = [];

function openUpload() { document.getElementById('upload-panel').classList.add('open'); }
function closeUpload() {
  document.getElementById('upload-panel').classList.remove('open');
  pendingFiles = [];
  document.getElementById('file-label').textContent = 'MP3, M4A, WAV, OGG acceptés';
  document.getElementById('file-input').value = '';
  document.getElementById('confirm-btn').disabled = true;
  document.getElementById('course-name').value = '';
  document.getElementById('subject-select').value = '';
}
function closeUploadOutside(e) { if (e.target===document.getElementById('upload-panel')) closeUpload(); }

function onFilePicked(e) {
  pendingFiles = Array.from(e.target.files);
  if (!pendingFiles.length) return;
  const names = pendingFiles.map(f=>f.name).join(', ');
  document.getElementById('file-label').textContent = pendingFiles.length+' fichier'+(pendingFiles.length>1?'s':'')+' : '+names;
  if (!document.getElementById('course-name').value) {
    document.getElementById('course-name').value = pendingFiles[0].name.replace(/\.[^.]+$/,'');
  }
  checkConfirm();
}

document.getElementById('subject-select').addEventListener('change', checkConfirm);
document.getElementById('course-name').addEventListener('input', checkConfirm);
function checkConfirm() {
  const ok = pendingFiles.length>0 && document.getElementById('subject-select').value;
  document.getElementById('confirm-btn').disabled = !ok;
}

function addCourse() {
  const subject = document.getElementById('subject-select').value;
  const name = document.getElementById('course-name').value.trim() || pendingFiles[0].name.replace(/\.[^.]+$/,'');
  const tracks = pendingFiles.map(f => ({ name: f.name.replace(/\.[^.]+$/,''), url: URL.createObjectURL(f) }));
  const course = { id: Date.now().toString(), subject, name, tracks, addedAt: Date.now() };
  library.unshift(course);
  saveLibrary();
  closeUpload();
  renderList();
  toast('Cours ajouté ✓');
  selectCourse(course.id);
}

// ── Toast ─────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2200);
}

// ── PWA install ───────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// ── Init ──────────────────────────────────────────────────────────────
buildFilters();
renderList();
</script>
</body>
</html>
